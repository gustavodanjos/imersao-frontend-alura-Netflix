<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix</title>
    <link rel="stylesheet" href="./assets/css/styles.css">
    <script src="./assets/js/main.js" defer></script>
</head>

<body>
    <div class="theme-container">
        <span class="theme-label">Tema</span>
        <span class="theme-icon">🌙</span>
        <label class="theme-switch" aria-label="Alternar modo claro/escuro">
            <input type="checkbox" id="theme-checkbox">
            <span class="slider"></span>
        </label>
        <span class="theme-icon">☀️</span>
    </div>
    <span class="logo">NETFLIX</span>
    <main>
        <header>
            <h1>Quem está assistindo?</h1>
        </header>

        <section aria-label="Perfis de usuários">
            <nav class="profiles">
                <ul class="profiles-list">
                    <li>
                        <a class="user-profile" href="#">
                            <figure>
                                <img src="./assets/img/perfil-1.png" alt="Imagem do perfil 1">
                                <figcaption>Usuário 1</figcaption>
                            </figure>
                        </a>
                    </li>
                    <li>
                        <a class="user-profile" href="#">
                            <figure>
                                <img src="./assets/img/perfil-2.png" alt="Imagem do perfil 2">
                                <figcaption>Usuário 2</figcaption>
                            </figure>
                        </a>
                    </li>
                    <li>
                        <a class="user-profile" href="#">
                            <figure>
                                <img src="./assets/img/perfil-3.png" alt="Imagem do perfil 3">
                                <figcaption>Usuário 3</figcaption>
                            </figure>
                        </a>
                    </li>
                    <li>
                        <a class="user-profile" href="#">
                            <figure>
                                <img src="./assets/img/perfil-4.png" alt="Imagem do perfil 4">
                                <figcaption>Usuário 4</figcaption>
                            </figure>
                        </a>
                    </li>
                </ul>
            </nav>
        </section>
    </main>
</body>

</html>
